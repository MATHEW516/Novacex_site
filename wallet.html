<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovaCex — Wallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">

  <nav class="flex justify-between items-center p-6 border-b border-gray-800">
    <h1 class="text-2xl font-bold text-blue-500">NovaCex</h1>
    <a href="dashboard.html" class="px-4 py-2 bg-blue-600 rounded-lg">Back to Dashboard</a>
  </nav>

  <section class="px-6 py-12 max-w-3xl mx-auto">
    <h2 class="text-3xl font-bold mb-6">Wallet Balances</h2>
    <ul id="walletList" class="space-y-4">
      <!-- JS generates balances -->
    </ul>
  </section>

  <script>
    const wallet = [
      {coin:'BTC', balance:0.01},
      {coin:'ETH', balance:0.25},
      {coin:'USDT', balance:1000},
      {coin:'BNB', balance:1.5}
    ];
    const list = document.getElementById('walletList');
    wallet.forEach(w => {
      const li = document.createElement('li');
      li.className = "bg-gray-900 p-4 rounded-xl flex justify-between";
      li.innerHTML = `<span>${w.coin}</span><span>${w.balance}</span>`;
      list.appendChild(li);
    });
  </script>

</body>
</html>
