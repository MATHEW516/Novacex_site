<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovaCex — Crypto Exchange</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">

  <!-- Navbar -->
  <nav class="flex justify-between items-center p-6 border-b border-gray-800">
    <h1 class="text-2xl font-bold text-blue-500">NovaCex</h1>
    <div class="space-x-4">
      <a href="login.html" class="px-4 py-2 border border-gray-600 rounded-lg">Login</a>
      <a href="signup.html" class="px-4 py-2 bg-blue-600 rounded-lg">Sign Up</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="text-center py-24 px-6">
    <h2 class="text-5xl font-bold mb-6">
      Trade Crypto Instantly on NovaCex
    </h2>
    <p class="text-gray-400 mb-8 max-w-xl mx-auto">
      Buy, sell and manage top cryptocurrencies securely with our advanced trading platform.
    </p>
    <a href="dashboard.html" class="bg-blue-600 px-8 py-4 rounded-xl text-lg font-semibold">
      Start Trading
    </a>
  </section>

  <!-- Markets Preview -->
  <section class="px-6 pb-24">
    <h3 class="text-2xl font-bold mb-6 text-center">Top Markets</h3>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto" id="coinsContainer">
      <!-- Live coins populated by JS -->
    </div>
  </section>

  <footer class="text-center p-6 border-t border-gray-800 text-gray-500">
    © 2026 NovaCex. All rights reserved.
  </footer>

  <script>
    async function loadCoins() {
      const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,binancecoin,solana,ripple,cardano,dogecoin,tron,toncoin,litecoin');
      const data = await res.json();
      const container = document.getElementById('coinsContainer');
      data.forEach(coin => {
        const div = document.createElement('div');
        div.className = "bg-gray-900 p-6 rounded-2xl text-center";
        div.innerHTML = `<h4 class="text-xl font-bold">${coin.symbol.toUpperCase()}/USDT</h4>
                         <p class="text-gray-400">${coin.name}</p>
                         <p class="text-green-400 font-semibold">$${coin.current_price}</p>
                         <a href="dashboard.html" class="mt-4 inline-block bg-blue-600 px-4 py-2 rounded-lg">Trade</a>`;
        container.appendChild(div);
      });
    }
    loadCoins();
  </script>

</body>
</html>
