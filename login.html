<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovaCex — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white flex items-center justify-center h-screen">

  <div class="bg-gray-900 p-10 rounded-3xl w-96">
    <h2 class="text-3xl font-bold mb-6 text-center text-blue-500">Login</h2>
    <form id="loginForm" class="space-y-4">
      <input type="email" placeholder="Email" required class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700" />
      <input type="password" placeholder="Password" required class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700" />
      <button type="submit" class="w-full bg-blue-600 p-3 rounded-xl font-semibold">Login</button>
    </form>
    <p class="mt-4 text-gray-400 text-center">No account? <a href="signup.html" class="text-blue-500">Sign Up</a></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Login simulated — integrate Firebase or backend later');
    });
  </script>
</body>
</html>
