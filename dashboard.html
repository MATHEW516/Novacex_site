<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovaCex — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">

  <nav class="flex justify-between items-center p-6 border-b border-gray-800">
    <h1 class="text-2xl font-bold text-blue-500">NovaCex</h1>
    <div class="space-x-4">
      <a href="wallet.html" class="px-4 py-2 border border-gray-600 rounded-lg">Wallet</a>
      <a href="p2p.html" class="px-4 py-2 border border-gray-600 rounded-lg">P2P</a>
      <a href="login.html" class="px-4 py-2 bg-blue-600 rounded-lg">Logout</a>
    </div>
  </nav>

  <section class="px-6 py-12">
    <h2 class="text-3xl font-bold mb-6">Markets</h2>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto" id="coinsContainer">
      <!-- JS populates live coin prices -->
    </div>
  </section>

  <script>
    async function loadCoins() {
      const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,binancecoin,solana,ripple,cardano,dogecoin,tron,toncoin,litecoin');
      const data = await res.json();
      const container = document.getElementById('coinsContainer');
      container.innerHTML = '';
      data.forEach(coin => {
        const div = document.createElement('div');
        div.className = "bg-gray-900 p-6 rounded-2xl text-center";
        div.innerHTML = `<h4 class="text-xl font-bold">${coin.symbol.toUpperCase()}/USDT</h4>
                         <p class="text-gray-400">${coin.name}</p>
                         <p class="text-green-400 font-semibold">$${coin.current_price}</p>
                         <button class="mt-4 bg-blue-600 px-4 py-2 rounded-lg">Trade</button>`;
        container.appendChild(div);
      });
    }
    loadCoins();
    setInterval(loadCoins, 60000); // refresh every 60s
  </script>

</body>
</html>
